name: frontend

on:
  push:
    branches: [main]
    paths:
      - "src/frontend/**"
  pull_request:
    paths:
      - "src/frontend/**"

permissions:
  contents: read
  id-token: write

jobs:
  ci:
    uses: ./.github/workflows/_docker-build-push.yml
    with:
      service_name: frontend
      service_path: src/frontend
      run_lint: true
      run_tests: false
