# Ci Piepline - frontend - (Python Flask)
# Trigger: Push to src/frontend/** on main branch
#          PR to main touching src/frontend

name: CI - frontend
on:
  push: 
    branches: [main]
    paths: 
      - "src/frontend/**"

  pull_request:
    branches: [main]
    paths:
      - "src/frontend/**"

env:
  SERVICE_NAME: frontend
  SERVICE_PATH: src/frontend
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}

jobs:
  # ── Build ─────────────────────────────────────────────────
  build:
    name: Build