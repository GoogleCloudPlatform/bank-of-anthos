name: ci-frontend

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - 'src/frontend/**'
      - '.github/workflows/ci-frontend.yml'
  push:
    branches: [main]
    paths:
      - 'src/frontend/**'
      - '.github/workflows/ci-frontend.yml'

permissions:
  id-token: write       # OIDC federation to Azure
  contents: read        # checkout repo
  security-events: write # upload Trivy SARIF to GitHub Advanced Security
  pull-requests: write   # Sonar PR decoration

env:
  SERVICE_NAME: frontend
  SERVICE_PATH: src/frontend
  ACR_REPO: boa/frontend
  PYTHON_VERSION: '3.11'
  IMAGE_TAG: sha-${{ github.sha }}

jobs:

  # ────────────────────────────────────────────────────────────
  # Job 1: Lint + Test
  # Produces coverage.xml as artifact for Sonar job
  # ────────────────────────────────────────────────────────────
  lint-test:
    runs-on: ubuntu-latest
    outputs:
      short-sha: ${{ steps.vars.outputs.short-sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Sonar needs full history for blame

      - id: vars
        name: Compute build variables
        run: echo "short-sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: ${{ env.SERVICE_PATH }}/requirements.txt

      - name: Install dependencies
        working-directory: ${{ env.SERVICE_PATH }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pylint pytest pytest-cov

      - name: Lint (pylint)
        working-directory: ${{ env.SERVICE_PATH }}
        run: pylint --rcfile=../../.pylintrc *.py || true
        # Frontend has no unit tests upstream — pylint only for now
        # `|| true` accepts existing tech debt; tighten in PR after baseline

      - name: Generate empty coverage report
        # Frontend has no tests → produce empty coverage.xml so Sonar job has something to consume
        # Replace with `pytest --cov=. --cov-report=xml` when tests exist
        working-directory: ${{ env.SERVICE_PATH }}
        run: |
          cat > coverage.xml <<'EOF'
          <?xml version="1.0" ?>
          <coverage version="7.0" timestamp="0" lines-valid="0" lines-covered="0" line-rate="0">
            <packages/>
          </coverage>
          EOF

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ env.SERVICE_NAME }}
          path: ${{ env.SERVICE_PATH }}/coverage.xml
          retention-days: 1

  # ────────────────────────────────────────────────────────────
  # Job 2: SonarCloud scan + quality gate
  # Blocks pipeline on quality gate failure
  # ────────────────────────────────────────────────────────────
  sonar:
    runs-on: ubuntu-latest
    needs: lint-test

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: coverage-${{ env.SERVICE_NAME }}
          path: ${{ env.SERVICE_PATH }}

      - name: Debug — verify secret length
        env:
          T: ${{ secrets.SONAR_TOKEN }}
        run: |
          echo "Token length: ${#T}"
          echo "First char masked: ${T:0:0}***"

      - name: Show sonar-project.properties
        working-directory: ${{ env.SERVICE_PATH }}
        run: |
          echo "=== sonar-project.properties ==="
          cat sonar-project.properties

      - name: SonarCloud scan (includes Quality Gate)
        uses: sonarsource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          projectBaseDir: ${{ env.SERVICE_PATH }}
          args: >
            -Dsonar.qualitygate.wait=false
            -Dsonar.qualitygate.timeout=600

  # ────────────────────────────────────────────────────────────
  # Job 3: Build + Trivy scan
  # Always runs (PR + push). Push happens only on main.
  # ────────────────────────────────────────────────────────────
  build-scan:
    runs-on: ubuntu-latest
    needs: [lint-test, sonar]
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      short-sha: ${{ needs.lint-test.outputs.short-sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image (load locally for scan)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.SERVICE_PATH }}
          file: ${{ env.SERVICE_PATH }}/Dockerfile
          load: true
          tags: ${{ env.SERVICE_NAME }}:${{ needs.lint-test.outputs.short-sha }}
          cache-from: type=gha,scope=${{ env.SERVICE_NAME }}
          cache-to: type=gha,mode=max,scope=${{ env.SERVICE_NAME }}

      - name: Trivy scan (CRITICAL only)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.SERVICE_NAME }}:${{ needs.lint-test.outputs.short-sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload Trivy SARIF to GitHub Advanced Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-${{ env.SERVICE_NAME }}

  # ────────────────────────────────────────────────────────────
  # Job 4: Sign + Push to ACR
  # Runs only on push to main, never on PR
  # ────────────────────────────────────────────────────────────
  sign-push:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build-scan
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          # subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          allow-no-subscriptions: true

      - name: Show Azure account (debug)
        run: az account show --output table


      # - name: ACR login
      #   run: az acr login --name $(echo "${{ secrets.ACR_LOGIN_SERVER }}" | cut -d. -f1)

      - name: ACR login (token-based)
        run: |
          ACR_NAME=$(echo "${{ secrets.ACR_LOGIN_SERVER }}" | cut -d. -f1)
          TOKEN=$(az acr login --name "$ACR_NAME" --expose-token --output tsv --query accessToken)
          echo "$TOKEN" | docker login "${{ secrets.ACR_LOGIN_SERVER }}" \
            --username 00000000-0000-0000-0000-000000000000 \
            --password-stdin

      - name: Build and push image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.SERVICE_PATH }}
          file: ${{ env.SERVICE_PATH }}/Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.ACR_REPO }}:${{ needs.build-scan.outputs.short-sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.ACR_REPO }}:main
          cache-from: type=gha,scope=${{ env.SERVICE_NAME }}
          cache-to: type=gha,mode=max,scope=${{ env.SERVICE_NAME }}

      - uses: sigstore/cosign-installer@v3

      - name: Cosign sign (keyless OIDC, public Rekor)
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: |
          cosign sign --yes \
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.ACR_REPO }}@${{ steps.push.outputs.digest }}

  # ────────────────────────────────────────────────────────────
  # Job 5: GitOps bump
  # Updates helm/boa-frontend/values.yaml in boa-gitops repo
  # ────────────────────────────────────────────────────────────
  gitops-bump:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [build-scan, sign-push]
    steps:
      - name: Checkout boa-gitops
        uses: actions/checkout@v4
        with:
          repository: mohdtarique/boa-gitops
          token: ${{ secrets.BOA_GITOPS_TOKEN }}
          ref: main

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Update image tag
        run: |
          yq eval -i \
            '.frontend.image.tag = "${{ needs.build-scan.outputs.short-sha }}"' \
            helm/boa-frontend/values.yaml

          # Sanity check — show what we're about to commit
          grep -A 3 "image:" helm/boa-frontend/values.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/boa-frontend/values.yaml
          git diff --cached --quiet && exit 0
          git commit -m "chore(frontend): bump image tag to ${{ needs.build-scan.outputs.short-sha }}

          Source: ${{ github.repository }}@${{ github.sha }}
          Workflow: ${{ github.workflow }} (run #${{ github.run_number }})"
          git push origin main