name: Manual Release Builder

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'The release version (e.g., v1.0.0)'
        required: true
        type: string
      repo_prefix:
        description: 'The repository prefix for container images'
        required: false
        default: 'us-central1-docker.pkg.dev/bank-of-anthos-ci/bank-of-anthos'
        type: string

permissions:
  contents: write
  pull-requests: write
  id-token: write # required for Google Workload Identity Federation OIDC

jobs:
  build-and-release:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Fetch all history for all tags and branches
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}

      - name: Validate Version Format
        run: |
          if [[ ! "${{ inputs.version }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Version must match format vX.Y.Z (e.g., v1.2.3)"
            exit 1
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Install Skaffold
        run: |
          curl -Lo skaffold https://storage.googleapis.com/skaffold/releases/v2.22.0/skaffold-linux-amd64
          chmod +x skaffold
          sudo mv skaffold /usr/local/bin/

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          # Supports either WIF (recommended) or Service Account key credentials
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          credentials_json: ${{ secrets.GCP_CREDENTIALS_JSON }}
          # Only fail if none of the auth secrets are set
          create_credentials_file: true

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker authentication
        run: |
          REGISTRY=$(echo "${{ inputs.repo_prefix }}" | cut -d'/' -f1)
          gcloud auth configure-docker "$REGISTRY"

      - name: Run Release Script
        env:
          NEW_VERSION: ${{ inputs.version }}
          REPO_PREFIX: ${{ inputs.repo_prefix }}
        run: |
          # Configure Git user identity for committing release changes
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          chmod +x ./docs/releasing/make-release.sh
          ./docs/releasing/make-release.sh

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
          NEW_VERSION: ${{ inputs.version }}
        run: |
          gh pr create \
            --title "Release ${NEW_VERSION}" \
            --body "Automated release PR for version ${NEW_VERSION} generated by GitHub Actions." \
            --head "release/${NEW_VERSION}" \
            --base "main"
